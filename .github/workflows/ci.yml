name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -w . && git diff --exit-code
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/mosaic
      - if: runner.os == 'Linux'
        run: go test -race ./...
      - if: runner.os == 'Linux'
        run: make example
      - if: runner.os == 'Linux'
        run: make package-test dependency-test package-pack package-example package-registry-test
      - if: runner.os == 'Linux'
        run: make lint
      - if: runner.os == 'Linux'
        shell: bash
        run: |
          go run ./cmd/mosaic --project ./examples/catalog-platform --quiet build prod --output /tmp/prod-a --clean
          go run ./cmd/mosaic --project ./examples/catalog-platform --quiet build prod --output /tmp/prod-b --clean
          for f in bundle.json graph.json provenance.json policy-report.json kubernetes.yaml kubernetes.json; do
            cmp /tmp/prod-a/$f /tmp/prod-b/$f
          done
