apiVersion: v1
kind: ServiceAccount
metadata:
    annotations:
        mosaic.dev/environment: stage
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.serviceAccount.main
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-stage
---
apiVersion: v1
data:
    APP_ENV: base
    LOG_LEVEL: info
kind: ConfigMap
metadata:
    annotations:
        mosaic.dev/environment: stage
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.config.runtime
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-stage
---
apiVersion: v1
kind: Service
metadata:
    annotations:
        mosaic.dev/environment: stage
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.expose.http
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        app.kubernetes.io/name: catalog-api
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-stage
spec:
    ports:
        - name: http
          port: "80"
          targetPort: "8080"
    selector:
        app.kubernetes.io/name: catalog-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
        mosaic.dev/environment: stage
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.workload.main
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: mosaic
        app.kubernetes.io/name: catalog-api
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-stage
spec:
    replicas: "2"
    selector:
        matchLabels:
            app.kubernetes.io/name: catalog-api
    template:
        metadata:
            labels:
                app.kubernetes.io/component: api
                app.kubernetes.io/managed-by: mosaic
                app.kubernetes.io/name: catalog-api
                something.com/owner: catalog-team
        spec:
            containers:
                - env:
                    - name: APP_ENV
                      value: base
                  image: ghcr.io/acme/catalog-api:1.4.0
                  name: catalog-api
                  ports:
                    - containerPort: "8080"
                      name: http
            serviceAccountName: catalog-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    annotations:
        mosaic.dev/environment: stage
        mosaic.dev/resource-id: application.catalog.capability.autoscaling
        mosaic.dev/source: variants/stage.mosaic
    labels: {}
    name: catalog-api-autoscaling
    namespace: catalog-stage
spec:
    maxReplicas: "6"
    metrics:
        - resource:
            name: cpu
            target:
                averageUtilization: "70"
                type: Utilization
          type: Resource
    minReplicas: "2"
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: catalog-api
