apiVersion: v1
kind: ServiceAccount
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.serviceAccount.main
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-prod
---
apiVersion: v1
data:
    APP_ENV: base
    LOG_LEVEL: info
kind: ConfigMap
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.config.runtime
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-prod
---
apiVersion: v1
kind: Service
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.expose.http
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        app.kubernetes.io/name: catalog-api
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-prod
spec:
    ports:
        - name: http
          port: 80
          targetPort: 8080
    selector:
        app.kubernetes.io/name: catalog-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/module: HttpService
        mosaic.dev/resource-id: application.catalog.workload.main
        mosaic.dev/source: modules/http-service/module.mosaic
    labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: mosaic
        app.kubernetes.io/name: catalog-api
        something.com/owner: catalog-team
    name: catalog-api
    namespace: catalog-prod
spec:
    replicas: 3
    selector:
        matchLabels:
            app.kubernetes.io/name: catalog-api
    template:
        metadata:
            labels:
                app.kubernetes.io/component: api
                app.kubernetes.io/managed-by: mosaic
                app.kubernetes.io/name: catalog-api
                something.com/owner: catalog-team
        spec:
            containers:
                - env:
                    - name: APP_ENV
                      value: base
                  image: ghcr.io/acme/catalog-api:1.4.0
                  name: catalog-api
                  ports:
                    - containerPort: 8080
                      name: http
            serviceAccountName: catalog-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/resource-id: application.catalog.capability.autoscaling
        mosaic.dev/source: variants/prod.mosaic
    labels: {}
    name: catalog-api-autoscaling
    namespace: catalog-prod
spec:
    maxReplicas: 12
    metrics:
        - resource:
            name: cpu
            target:
                averageUtilization: 65
                type: Utilization
          type: Resource
    minReplicas: 3
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: catalog-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    annotations:
        mosaic.dev/environment: prod
        mosaic.dev/resource-id: application.catalog.capability.disruptionProtection
        mosaic.dev/source: variants/prod.mosaic
    labels: {}
    name: catalog-api-disruption-protection
    namespace: catalog-prod
spec:
    minAvailable: 2
    selector:
        matchLabels:
            app.kubernetes.io/name: catalog-api
